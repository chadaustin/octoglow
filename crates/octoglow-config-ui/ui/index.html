<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Octoglow Settings</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <main class="dialog">
      <section class="tree-pane" aria-label="Folder tree">
        <div id="tree" class="tree" role="tree"></div>
      </section>
      <aside class="selection-pane">
        <h2>Selected folders</h2>
        <ul id="selection" class="selection"></ul>
      </aside>
      <footer class="actions">
        <span id="status" class="status"></span>
        <button id="cancel" type="button">Cancel</button>
        <button id="save" type="button" class="primary">Save</button>
      </footer>
    </main>
  </body>
</html>
